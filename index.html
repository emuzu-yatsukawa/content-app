<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>社内AI活用コンペ - タスク管理アプリ</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">

    <header class="bg-slate-900 text-white p-4 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-wider">AIコンペ開発システム</h1>
            <div class="flex items-center gap-4">
                <div class="bg-slate-800 px-3 py-1 rounded-full border border-slate-700">
                    <span class="text-xs text-amber-400 font-bold">Lv.</span>
                    <span id="user-level" class="text-sm font-bold">1</span>
                </div>
                <div class="w-32 bg-slate-700 h-2.5 rounded-full overflow-hidden">
                    <div id="exp-bar" class="bg-amber-400 h-full transition-all duration-300" style="width: 0%"></div>
                </div>
                <span id="user-exp-text" class="text-xs text-slate-400">0 / 100 EXP</span>
            </div>
        </div>
    </header>

    <main class="flex-1 container mx-auto p-4 max-w-6xl my-6 grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <div class="flex flex-col gap-6">
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
                <div class="flex justify-between items-center mb-4">
                    <h2 id="calendar-month-year" class="text-base font-bold text-slate-700">2026年 5月</h2>
                    <div class="flex gap-1">
                        <button id="btn-prev-month" class="p-1.5 hover:bg-slate-100 rounded-lg text-slate-600 transition cursor-pointer">◀</button>
                        <button id="btn-next-month" class="p-1.5 hover:bg-slate-100 rounded-lg text-slate-600 transition cursor-pointer">▶</button>
                    </div>
                </div>
                <div class="grid grid-cols-7 gap-1 text-center text-xs font-bold text-slate-400 mb-2">
                    <div class="text-rose-500">日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div class="text-indigo-500">土</div>
                </div>
                <div id="calendar-days" class="grid grid-cols-7 gap-1 text-center text-sm">
                </div>
            </div>

            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex flex-col h-[320px]">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-sm font-bold text-slate-700 flex items-center gap-1.5">
                        📊 データの可視化
                    </h2>
                    <div class="flex bg-slate-100 p-0.5 rounded-lg border border-slate-200">
                        <button id="tab-daily" class="px-2.5 py-1 text-xs font-bold rounded-md bg-white text-indigo-600 shadow-xs cursor-pointer transition">本日</button>
                        <button id="tab-weekly" class="px-2.5 py-1 text-xs font-medium rounded-md text-slate-500 hover:text-slate-800 cursor-pointer transition">週間</button>
                    </div>
                </div>
                
                <div class="flex-1 relative flex items-center justify-center min-h-0">
                    <div class="absolute inset-0 w-full h-full p-2">
                        <canvas id="taskChart"></canvas>
                    </div>
                    <div id="no-chart-data" class="absolute inset-0 flex items-center justify-center bg-white/90 text-slate-400 text-xs font-medium hidden">
                        この日の作業グラフはありません
                    </div>
                </div>
            </div>
        </div>
        
        <div class="md:col-span-2 grid grid-cols-1 lg:grid-cols-5 gap-6 h-fit">
            
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 lg:col-span-2 flex flex-col justify-between min-h-[320px]">
                <div>
                    <div class="flex justify-between items-center mb-3">
                        <h2 class="text-sm font-bold flex items-center gap-1.5">
                            <span class="inline-block w-1.5 h-3.5 bg-indigo-600 rounded"></span>タスクの計測
                        </h2>
                    </div>
                    <div class="text-center text-xs font-bold text-indigo-600 bg-indigo-50 py-1.5 rounded-full border border-indigo-100 mb-6">
                        選択日: <span id="target-date-display">----/--/--</span>
                    </div>
                </div>
                
                <div class="flex flex-col items-center justify-center py-6 bg-slate-50 rounded-xl border border-slate-200 px-4 flex-1">
                    <div class="w-full mb-4">
                        <input type="text" id="task-name-input" placeholder="タスク名を入力..." class="w-full bg-white border border-slate-200 rounded-xl px-3 py-2 text-xs focus:outline-none focus:border-indigo-500 transition shadow-inner">
                    </div>

                    <div id="timer-display" class="text-4xl font-mono font-bold tracking-tight text-slate-700 mb-6">00:00:00</div>
                    
                    <div class="flex gap-2 w-full">
                        <button id="btn-start" class="flex-1 py-2.5 bg-indigo-600 text-white text-xs font-medium rounded-lg hover:bg-indigo-700 transition shadow-sm active:scale-95 cursor-pointer">計測開始</button>
                        <button id="btn-stop" class="flex-1 py-2.5 bg-rose-600 text-white text-xs font-medium rounded-lg hover:bg-rose-700 transition shadow-sm active:scale-95 cursor-pointer hidden">計測終了</button>
                    </div>
                </div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 lg:col-span-3 flex flex-col min-h-[320px]">
                <h2 class="text-sm font-bold mb-4 flex items-center gap-1.5">
                    <span class="inline-block w-1.5 h-3.5 bg-emerald-500 rounded"></span><span id="record-title-date">選択日</span>の実績
                </h2>
                <div class="overflow-x-auto flex-1">
                    <table class="w-full text-left text-xs text-slate-600">
                        <thead>
                            <tr class="border-b border-slate-100 font-bold text-slate-400 pb-2">
                                <th class="py-2 pl-1">タスク名</th>
                                <th class="py-2">完了時刻</th>
                                <th class="py-2">作業時間</th>
                                <th class="py-2 pr-1 text-right">獲得EXP</th>
                            </tr>
                        </thead>
                        <tbody id="log-table-body" class="divide-y divide-slate-50">
                        </tbody>
                    </table>
                </div>
            </div>
            
        </div>

    </main>

    <footer class="bg-slate-100 text-center py-4 text-xs text-slate-400 border-t border-slate-200 mt-auto">
        &copy; 2026 社内AI活用コンペ開発チーム
    </footer>

    <script>
        // --- 1. アプリ全体のデータ構造 ---
        let AppState = {
            level: 1,
            exp: 0,
            taskLogs: []
        };

        const STORAGE_KEY = 'ai_comp_app_state';

        let currentSelectedDate = new Date();
        let calendarCurrentMonthDate = new Date();

        // グラフ用インスタンス（1つのキャンバスを共有）
        let globalChartInstance = null;
        let currentGraphTab = 'daily';

        // --- 2. 状態管理（セーブ＆ロード） ---
        function saveStateToLocalStorage() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(AppState));
        }

        function loadStateFromLocalStorage() {
            const savedData = localStorage.getItem(STORAGE_KEY);
            if (savedData) {
                try {
                    AppState = JSON.parse(savedData);
                } catch (e) {
                    console.error('データ読み込み失敗。', e);
                }
            }
            updateStatusUI();
            renderLogs();
            renderCalendar();
            setupTabEvents();
        }

        // --- 3. UI更新用の関数 ---
        function updateStatusUI() {
            const nextLevelExp = 100;
            const progressPercent = Math.min((AppState.exp / nextLevelExp) * 100, 100);

            document.getElementById('user-level').innerText = AppState.level;
            document.getElementById('user-exp-text').innerText = `${AppState.exp} / ${nextLevelExp} EXP`;
            document.getElementById('exp-bar').style.width = `${progressPercent}%`;
        }

        function hasLogsOnDate(year, month, day) {
            return AppState.taskLogs.some(log => {
                const logDate = new Date(log.endTime);
                return logDate.getFullYear() === year &&
                       logDate.getMonth() === month &&
                       logDate.getDate() === day;
            });
        }

        // --- 4. 動的カレンダー生成ロジック ---
        function renderCalendar() {
            const daysContainer = document.getElementById('calendar-days');
            const monthYearTitle = document.getElementById('calendar-month-year');
            daysContainer.innerHTML = '';

            const year = calendarCurrentMonthDate.getFullYear();
            const month = calendarCurrentMonthDate.getMonth();

            monthYearTitle.innerText = `${year}年 ${(month + 1)}月`;

            const firstDayIndex = new Date(year, month, 1).getDay();
            const totalDays = new Date(year, month + 1, 0).getDate();

            for (let i = 0; i < firstDayIndex; i++) {
                const blank = document.createElement('div');
                daysContainer.appendChild(blank);
            }

            for (let day = 1; day <= totalDays; day++) {
                const dayBtn = document.createElement('button');
                dayBtn.innerText = day;
                
                const isSelected = currentSelectedDate.getFullYear() === year &&
                                   currentSelectedDate.getMonth() === month &&
                                   currentSelectedDate.getDate() === day;

                const today = new Date();
                const isToday = today.getFullYear() === year &&
                                today.getMonth() === month &&
                                today.getDate() === day;

                if (isSelected) {
                    dayBtn.className = "h-8 w-8 mx-auto flex flex-col items-center justify-center rounded-full text-xs font-bold transition relative cursor-pointer active:scale-90 bg-indigo-600 text-white shadow-sm";
                } else if (isToday) {
                    dayBtn.className = "h-8 w-8 mx-auto flex flex-col items-center justify-center rounded-full text-xs font-bold transition relative cursor-pointer active:scale-90 border-2 border-indigo-600 text-indigo-600";
                } else {
                    dayBtn.className = "h-8 w-8 mx-auto flex flex-col items-center justify-center rounded-full text-xs font-medium transition relative cursor-pointer active:scale-90 text-slate-600 hover:bg-slate-100";
                }

                if (hasLogsOnDate(year, month, day)) {
                    const dot = document.createElement('span');
                    dot.className = `w-1 h-1 rounded-full absolute bottom-1 ${isSelected ? 'bg-white' : 'bg-emerald-500'}`;
                    dayBtn.appendChild(dot);
                }

                dayBtn.addEventListener('click', () => {
                    currentSelectedDate = new Date(year, month, day);
                    renderCalendar(); 
                    renderLogs();     
                });

                daysContainer.appendChild(dayBtn);
            }
        }

        document.getElementById('btn-prev-month').addEventListener('click', () => {
            calendarCurrentMonthDate.setMonth(calendarCurrentMonthDate.getMonth() - 1);
            renderCalendar();
        });
        document.getElementById('btn-next-month').addEventListener('click', () => {
            calendarCurrentMonthDate.setMonth(calendarCurrentMonthDate.getMonth() + 1);
            renderCalendar();
        });


        // --- 5. 実績ログの描画ロジック ---
        function renderLogs() {
            const tbody = document.getElementById('log-table-body');
            tbody.innerHTML = '';

            const targetYear = currentSelectedDate.getFullYear();
            const targetMonth = currentSelectedDate.getMonth();
            const targetDay = currentSelectedDate.getDate();

            const formattedDate = `${targetYear}/${(targetMonth + 1).toString().padStart(2, '0')}/${targetDay.toString().padStart(2, '0')}`;
            document.getElementById('target-date-display').innerText = formattedDate;
            document.getElementById('record-title-date').innerText = `${(targetMonth + 1)}/${targetDay}`;

            const filteredLogs = AppState.taskLogs.filter(log => {
                const logDate = new Date(log.endTime);
                return logDate.getFullYear() === targetYear &&
                       logDate.getMonth() === targetMonth &&
                       logDate.getDate() === targetDay;
            });

            renderUnifiedChart(filteredLogs, currentSelectedDate);

            const displayLogs = [...filteredLogs].reverse().slice(0, 5); // スペース拡大に伴い表示件数を5件に拡張

            if (displayLogs.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="py-8 text-center text-slate-400 text-xs">本日記録されたタスク実績はありません</td></tr>`;
                return;
            }

            displayLogs.forEach(log => {
                const date = new Date(log.endTime);
                const timeString = `${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}`;
                
                const hrs = Math.floor(log.durationSeconds / 3600).toString().padStart(2, '0');
                const mins = Math.floor((log.durationSeconds % 3600) / 60).toString().padStart(2, '0');
                const secs = (log.durationSeconds % 60).toString().padStart(2, '0');
                const durationString = `${hrs}:${mins}:${secs}`;

                const taskNameDisplay = log.taskName ? log.taskName : '名無しのタスク';

                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50 transition-colors text-xs text-slate-600";
                tr.innerHTML = `
                    <td class="py-2.5 pl-1 font-medium text-slate-700 max-w-[160px] truncate" title="${taskNameDisplay}">${taskNameDisplay}</td>
                    <td class="py-2.5 text-slate-400">${timeString}</td>
                    <td class="py-2.5 font-mono text-slate-500">${durationString}</td>
                    <td class="py-2.5 pr-1 text-emerald-600 font-bold text-right">+${log.expGained}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // --- 6. タブ切り替え統合グラフ描画ロジック（はみ出し修正版） ---
        function renderUnifiedChart(dayLogs, baseDate) {
            const ctx = document.getElementById('taskChart').getContext('2d');
            const noDataEl = document.getElementById('no-chart-data');

            if (globalChartInstance) {
                globalChartInstance.destroy();
            }

            // 1. 本日（日別ドーナツ）の描画
            if (currentGraphTab === 'daily') {
                if (!dayLogs || dayLogs.length === 0) {
                    noDataEl.classList.remove('hidden');
                    return;
                } else {
                    noDataEl.classList.add('hidden');
                }

                const taskSummary = {};
                dayLogs.forEach(log => {
                    const name = log.taskName ? log.taskName.trim() : '名無しのタスク';
                    const min = Math.max(1, Math.round(log.durationSeconds / 60));
                    taskSummary[name] = (taskSummary[name] || 0) + min;
                });

                globalChartInstance = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: Object.keys(taskSummary),
                        datasets: [{
                            data: Object.values(taskSummary),
                            backgroundColor: ['#4f46e5', '#10b981', '#f59e0b', '#ec4899', '#3b82f6', '#8b5cf6'],
                            borderWidth: 2,
                            borderColor: '#ffffff'
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        layout: {
                            padding: { top: 10, bottom: 10, left: 10, right: 10 } // 内側パディングではみ出し防止
                        },
                        plugins: {
                            legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 10 } } }
                        }
                    }
                });

            // 2. 週間（週間推移棒グラフ）の描画
            } else if (currentGraphTab === 'weekly') {
                noDataEl.classList.add('hidden');

                const dateLabels = [];
                const dateKeys = [];
                for (let i = 6; i >= 0; i--) {
                    const d = new Date(baseDate.getTime());
                    d.setDate(baseDate.getDate() - i);
                    dateLabels.push(`${d.getMonth() + 1}/${d.getDate()}`);
                    dateKeys.push({ y: d.getFullYear(), m: d.getMonth(), d: d.getDate() });
                }

                const weeklyMinutes = new Array(7).fill(0);
                AppState.taskLogs.forEach(log => {
                    const logDate = new Date(log.endTime);
                    const idx = dateKeys.findIndex(k => k.y === logDate.getFullYear() && k.m === logDate.getMonth() && k.d === logDate.getDate());
                    if (idx !== -1) {
                        weeklyMinutes[idx] += Math.max(1, Math.round(log.durationSeconds / 60));
                    }
                });

                globalChartInstance = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: dateLabels,
                        datasets: [{
                            data: weeklyMinutes,
                            backgroundColor: 'rgba(79, 70, 229, 0.85)',
                            hoverBackgroundColor: '#4f46e5',
                            borderRadius: 4
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        layout: {
                            padding: { top: 10, bottom: 5, left: 5, right: 5 }
                        },
                        scales: {
                            y: { beginAtZero: true, ticks: { font: { size: 9 } }, grid: { color: '#f1f5f9' } },
                            x: { ticks: { font: { size: 9 } }, grid: { display: false } }
                        },
                        plugins: { legend: { display: false } }
                    }
                });
            }
        }

        // --- タブボタンのクリックイベント制御 ---
        function setupTabEvents() {
            const tabDaily = document.getElementById('tab-daily');
            const tabWeekly = document.getElementById('tab-weekly');

            tabDaily.addEventListener('click', () => {
                currentGraphTab = 'daily';
                tabDaily.className = "px-2.5 py-1 text-xs font-bold rounded-md bg-white text-indigo-600 shadow-xs cursor-pointer transition";
                tabWeekly.className = "px-2.5 py-1 text-xs font-medium rounded-md text-slate-500 hover:text-slate-800 cursor-pointer transition";
                renderLogs();
            });

            tabWeekly.addEventListener('click', () => {
                currentGraphTab = 'weekly';
                tabWeekly.className = "px-2.5 py-1 text-xs font-bold rounded-md bg-white text-indigo-600 shadow-xs cursor-pointer transition";
                tabDaily.className = "px-2.5 py-1 text-xs font-medium rounded-md text-slate-500 hover:text-slate-800 cursor-pointer transition";
                renderLogs();
            });
        }

        // --- 7. 経験値の獲得 ＆ レベルアップロジック ---
        function gainExp(amount) {
            AppState.exp += amount;
            const nextLevelExp = 100;

            if (AppState.exp >= nextLevelExp) {
                AppState.level += Math.floor(AppState.exp / nextLevelExp);
                AppState.exp = AppState.exp % nextLevelExp;
                alert(`🎉 レベルアップ！ Lv.${AppState.level} になりました！`);
            }

            updateStatusUI();
            saveStateToLocalStorage();
        }

        // --- 8. タイマー機能のロジック ---
        let timerInterval = null;
        let timerSecondsCount = 0;

        const timerDisplay = document.getElementById('timer-display');
        const btnStart = document.getElementById('btn-start');
        const btnStop = document.getElementById('btn-stop');
        const taskNameInput = document.getElementById('task-name-input');

        btnStart.addEventListener('click', () => {
            btnStart.classList.add('hidden');
            btnStop.classList.remove('hidden');
            taskNameInput.disabled = true;
            taskNameInput.classList.add('bg-slate-100', 'text-slate-400');

            timerSecondsCount = 0;
            timerInterval = setInterval(() => {
                timerSecondsCount++;
                const hrs = Math.floor(timerSecondsCount / 3600).toString().padStart(2, '0');
                const mins = Math.floor((timerSecondsCount % 3600) / 60).toString().padStart(2, '0');
                const secs = (timerSecondsCount % 60).toString().padStart(2, '0');
                timerDisplay.innerText = `${hrs}:${mins}:${secs}`;
            }, 1000);
        });

        btnStop.addEventListener('click', () => {
            if (!timerInterval) return;
            clearInterval(timerInterval);
            timerInterval = null;

            const durationSeconds = timerSecondsCount;
            timerDisplay.innerText = "00:00:00";
            btnStart.classList.remove('hidden');
            btnStop.classList.add('hidden');
            taskNameInput.disabled = false;
            taskNameInput.classList.remove('bg-slate-100', 'text-slate-400');

            if (durationSeconds > 0) {
                const expGained = durationSeconds; 
                const currentTaskName = taskNameInput.value.trim();
                const now = new Date();
                const logTimestamp = new Date(currentSelectedDate.getTime());
                logTimestamp.setHours(now.getHours(), now.getMinutes(), now.getSeconds());

                const newLog = {
                    id: crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(),
                    taskName: currentTaskName,
                    startTime: new Date(logTimestamp.getTime() - (durationSeconds * 1000)).toISOString(),
                    endTime: logTimestamp.toISOString(),
                    durationSeconds: durationSeconds,
                    expGained: expGained
                };

                AppState.taskLogs.push(newLog);
                saveStateToLocalStorage();
                renderLogs();
                renderCalendar();
                gainExp(expGained);
                taskNameInput.value = '';
            }
        });

        // --- 9. アプリ起動時の初期化処理 ---
        window.addEventListener('DOMContentLoaded', () => {
            loadStateFromLocalStorage();
        });

    </script>
</body>
</html>
