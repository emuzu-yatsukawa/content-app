<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Quest Cloud - タスク管理アプリ (認証付きSupabase版)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col antialiased">

    <div id="auth-overlay" class="fixed inset-0 bg-slate-900/60 backdrop-blur-xs z-100 flex items-center justify-center p-4 hidden">
        <div class="bg-white p-6 md:p-8 rounded-2xl shadow-xl border border-slate-200 w-full max-w-md">
            <h2 id="auth-title" class="text-xl font-bold text-slate-800 mb-2">🚀 Task Quest Cloud へログイン</h2>
            <p id="auth-subtitle" class="text-xs text-slate-400 mb-6">メールアドレスとパスワードを入力してください。</p>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1">メールアドレス</label>
                    <input type="email" id="auth-email" placeholder="example@company.com" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-sm focus:outline-hidden focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1">パスワード</label>
                    <input type="password" id="auth-password" placeholder="••••••••" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-sm focus:outline-hidden focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition">
                </div>
                
                <button id="btn-auth-primary" class="w-full py-2.5 bg-indigo-600 text-white text-sm font-bold rounded-xl hover:bg-indigo-700 transition cursor-pointer active:scale-98">
                    ログインする
                </button>
                
                <div class="text-center pt-2">
                    <button id="btn-auth-toggle" class="text-xs text-indigo-600 hover:underline font-medium cursor-pointer">
                        初めての方はこちら（新規アカウント登録）
                    </button>
                </div>
            </div>
        </div>
    </div>

    <header class="bg-slate-900 text-white p-4 shadow-md sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-wider flex items-center gap-2">
                🚀 <span class="bg-linear-to-r from-indigo-400 to-emerald-400 bg-clip-text text-transparent">Task Quest Cloud</span>
            </h1>
            <div class="flex items-center gap-4">
                <div id="sync-indicator" class="text-xs px-2 py-0.5 rounded bg-amber-500/20 text-amber-400 border border-amber-500/30 font-mono">
                    接続中...
                </div>
                
                <span id="user-email-display" class="text-xs text-slate-400 hidden max-w-[150px] truncate">---</span>
                <button id="btn-logout" class="text-xs bg-slate-800 border border-slate-700 text-slate-300 px-2 py-1 rounded-md hover:bg-slate-700 transition cursor-pointer hidden">ログアウト</button>

                <div class="bg-slate-800 px-3 py-1 rounded-full border border-slate-700 flex items-center gap-1 shadow-inner">
                    <span class="text-xs text-amber-400 font-bold">Lv.</span>
                    <span id="user-level" class="text-sm font-bold text-slate-100">1</span>
                </div>
                <div class="w-32 bg-slate-700 h-2.5 rounded-full overflow-hidden shadow-inner relative">
                    <div id="exp-bar" class="bg-linear-to-r from-amber-400 to-orange-400 h-full transition-all duration-300" style="width: 0%"></div>
                </div>
                <span id="user-exp-text" class="text-xs text-slate-400 font-mono">0 / 100 EXP</span>
            </div>
        </div>
    </header>

    <main class="flex-1 container mx-auto p-4 max-w-6xl my-6 grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <div class="flex flex-col gap-6">
            <div class="bg-white p-5 rounded-2xl shadow-xs border border-slate-200/60">
                <div class="flex justify-between items-center mb-4">
                    <h2 id="calendar-month-year" class="text-sm font-bold text-slate-700">----年 --月</h2>
                    <div class="flex gap-1">
                        <button id="btn-prev-month" class="p-1.5 hover:bg-slate-100 rounded-lg text-slate-600 transition cursor-pointer">◀</button>
                        <button id="btn-next-month" class="p-1.5 hover:bg-slate-100 rounded-lg text-slate-600 transition cursor-pointer">▶</button>
                    </div>
                </div>
                <div class="grid grid-cols-7 gap-1 text-center text-xs font-bold text-slate-400 mb-2">
                    <div class="text-rose-500">日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div class="text-indigo-500">土</div>
                </div>
                <div id="calendar-days" class="grid grid-cols-7 gap-1 text-center text-sm"></div>
            </div>

            <div class="bg-white p-5 rounded-2xl shadow-xs border border-slate-200/60 flex flex-col h-[320px]">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-sm font-bold text-slate-700 flex items-center gap-1.5">
                        📊 データの可視化
                    </h2>
                    <div class="flex bg-slate-100 p-0.5 rounded-lg border border-slate-200">
                        <button id="tab-daily" class="px-2.5 py-1 text-xs font-bold rounded-md bg-white text-indigo-600 shadow-xs cursor-pointer transition">本日</button>
                        <button id="tab-weekly" class="px-2.5 py-1 text-xs font-medium rounded-md text-slate-500 hover:text-slate-800 cursor-pointer transition">週間</button>
                    </div>
                </div>
                
                <div class="flex-1 relative flex items-center justify-center min-h-0">
                    <div class="absolute inset-0 w-full h-full p-2">
                        <canvas id="taskChart"></canvas>
                    </div>
                    <div id="no-chart-data" class="absolute inset-0 flex items-center justify-center bg-white/90 text-slate-400 text-xs font-medium hidden">
                        この日の作業グラフはありません
                    </div>
                </div>
            </div>
        </div>
        
        <div class="md:col-span-2 grid grid-cols-1 lg:grid-cols-5 gap-6 h-fit">
            
            <div class="bg-white p-6 rounded-2xl shadow-xs border border-slate-200/60 lg:col-span-2 flex flex-col justify-between min-h-[320px]">
                <div>
                    <div class="flex justify-between items-center mb-3">
                        <h2 class="text-sm font-bold flex items-center gap-1.5">
                            <span class="inline-block w-1.5 h-3.5 bg-indigo-600 rounded"></span>タスクの計測
                        </h2>
                    </div>
                    <div class="text-center text-xs font-bold text-indigo-600 bg-indigo-50 py-1.5 rounded-full border border-indigo-100 mb-6 shadow-xs">
                        表示中: <span id="target-date-display">----/--/--</span>
                    </div>
                </div>
                
                <div class="flex flex-col items-center justify-center py-6 bg-slate-50 rounded-xl border border-slate-200/80 px-4 flex-1">
                    <div class="w-full mb-4">
                        <input type="text" id="task-name-input" placeholder="タスク名を入力..." class="w-full bg-white border border-slate-200 rounded-xl px-3 py-2 text-xs focus:outline-hidden focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition shadow-inner">
                    </div>

                    <div id="timer-display" class="text-4xl font-mono font-bold tracking-tight text-slate-700 mb-6 select-none">00:00:00</div>
                    
                    <div class="flex gap-2 w-full">
                        <button id="btn-start" class="flex-1 py-2.5 bg-indigo-600 text-white text-xs font-bold rounded-lg hover:bg-indigo-700 transition shadow-xs active:scale-98 cursor-pointer">計測開始</button>
                        <button id="btn-stop" class="flex-1 py-2.5 bg-rose-600 text-white text-xs font-bold rounded-lg hover:bg-rose-700 transition shadow-xs active:scale-98 cursor-pointer hidden">計測終了</button>
                    </div>
                </div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-xs border border-slate-200/60 lg:col-span-3 flex flex-col min-h-[320px]">
                <h2 class="text-sm font-bold mb-4 flex items-center gap-1.5">
                    <span class="inline-block w-1.5 h-3.5 bg-emerald-500 rounded"></span><span id="record-title-date">選択日</span>の実績
                </h2>
                <div class="overflow-x-auto flex-1">
                    <table class="w-full text-left text-xs text-slate-600">
                        <thead>
                            <tr class="border-b border-slate-100 font-bold text-slate-400 pb-2">
                                <th class="py-2 pl-1 w-[40%]">タスク名</th>
                                <th class="py-2 w-[20%]">完了時刻</th>
                                <th class="py-2 w-[20%]">作業時間</th>
                                <th class="py-2 pr-1 w-[15%] text-right">獲得EXP</th>
                                <th class="py-2 pr-1 w-[5%] text-right"></th>
                            </tr>
                        </thead>
                        <tbody id="log-table-body" class="divide-y divide-slate-50"></tbody>
                    </table>
                </div>
            </div>
            
        </div>

    </main>

    <footer class="bg-slate-100 text-center py-4 text-xs text-slate-400 border-t border-slate-200 mt-auto flex justify-between items-center px-6">
        <div>&copy; 2026 社内AI活用コンペ開発チーム</div>
        <button id="btn-reset-all" class="text-slate-400 hover:text-rose-500 font-medium transition cursor-pointer text-xs flex items-center gap-1">⚠️ 全データを初期化</button>
    </footer>

    <script>
        // --- [Supabase設定] ---
        const SUPABASE_URL = 'https://hrshwvtxqzzbbghjgdjn.supabase.co'; 
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhyc2h3dnR4cXp6YmJnaGpnZGpuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1NjIzMTQsImV4cCI6MjA5NjEzODMxNH0.8PZI4L391dNd3LPHB2D_asX9njJZiRXyYtwTc4c8TwI'; 
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ログインしたユーザーの一意なID（初期状態はnull）
        let userId = null;

        // --- 1. アプリ全体のデータ構造・定数 ---
        let AppState = {
            level: 1,
            exp: 0,
            taskLogs: []
        };

        const EXP_BASE = 100; 
        const RUNNING_TIMER_START_KEY = 'ai_comp_running_timer_start';
        const RUNNING_TIMER_NAME_KEY = 'ai_comp_running_timer_name';
        
        let currentSelectedDate = new Date();
        let calendarCurrentMonthDate = new Date();

        let globalChartInstance = null;
        let currentGraphTab = 'daily';

        let timerInterval = null;
        let timerStartTime = null; 

        // DOM要素の取得
        const timerDisplay = document.getElementById('timer-display');
        const btnStart = document.getElementById('btn-start');
        const btnStop = document.getElementById('btn-stop');
        const taskNameInput = document.getElementById('task-name-input');
        const btnResetAll = document.getElementById('btn-reset-all');
        const syncIndicator = document.getElementById('sync-indicator');

        // 認証関連DOM要素の取得
        const authOverlay = document.getElementById('auth-overlay');
        const authTitle = document.getElementById('auth-title');
        const authSubtitle = document.getElementById('auth-subtitle');
        const authEmail = document.getElementById('auth-email');
        const authPassword = document.getElementById('auth-password');
        const btnAuthPrimary = document.getElementById('btn-auth-primary');
        const btnAuthToggle = document.getElementById('btn-auth-toggle');
        const btnLogout = document.getElementById('btn-logout');
        const userEmailDisplay = document.getElementById('user-email-display');

        let isSignUpMode = false; // ログイン画面と新規登録画面の切り替えフラグ

        // 同期状態の表示切り替え
        function setSyncStatus(status) {
            if (status === 'syncing') {
                syncIndicator.innerText = '⚡ 同期中...';
                syncIndicator.className = 'text-xs px-2 py-0.5 rounded bg-blue-500/20 text-blue-400 border border-blue-500/30 font-mono';
            } else if (status === 'success') {
                syncIndicator.innerText = '☁️ クラウド同期済';
                syncIndicator.className = 'text-xs px-2 py-0.5 rounded bg-emerald-500/20 text-emerald-400 border border-emerald-500/30 font-mono';
            } else {
                syncIndicator.innerText = '❌ 同期エラー';
                syncIndicator.className = 'text-xs px-2 py-0.5 rounded bg-rose-500/20 text-rose-400 border border-rose-500/30 font-mono';
            }
        }

        // --- 🔑 認証（Auth）制御ロジック ---
        function handleAuthStateChange(session) {
            if (session && session.user) {
                userId = session.user.id;
                userEmailDisplay.innerText = session.user.email;
                userEmailDisplay.classList.remove('hidden');
                btnLogout.classList.remove('hidden');
                authOverlay.classList.add('hidden'); // ログイン成功時に画面を解放
                loadStateFromSupabase();
            } else {
                userId = null;
                userEmailDisplay.classList.add('hidden');
                btnLogout.classList.add('hidden');
                authOverlay.classList.remove('hidden'); // 未ログイン時はモーダルを強制表示
                setSyncStatus('error');
            }
        }

        // ログイン ⇄ 新規登録 のUI切り替えボタン
        btnAuthToggle.addEventListener('click', () => {
            isSignUpMode = !isSignUpMode;
            if (isSignUpMode) {
                authTitle.innerText = '✨ 新規アカウント登録';
                authSubtitle.innerText = '新しいメールアドレスとパスワードを入力して登録します。';
                btnAuthPrimary.innerText = 'アカウントを作成する';
                btnAuthToggle.innerText = '既にアカウントをお持ちの方（ログイン）';
            } else {
                authTitle.innerText = '🚀 Task Quest Cloud へログイン';
                authSubtitle.innerText = 'メールアドレスとパスワードを入力してください。';
                btnAuthPrimary.innerText = 'ログインする';
                btnAuthToggle.innerText = '初めての方はこちら（新規アカウント登録）';
            }
        });

        // 認証処理（ログイン実行 または アカウント作成）
        btnAuthPrimary.addEventListener('click', async () => {
            const email = authEmail.value.trim();
            const password = authPassword.value;

            if (!email || !password) {
                alert('メールアドレスとパスワードを入力してください。');
                return;
            }

            setSyncStatus('syncing');

            if (isSignUpMode) {
                const { data, error } = await supabaseClient.auth.signUp({ email, password });
                if (error) {
                    alert(`登録エラー: ${error.message}`);
                    setSyncStatus('error');
                } else {
                    alert('アカウントの作成に成功しました！自動的にログインします。');
                    authPassword.value = '';
                }
            } else {
                const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
                if (error) {
                    alert(`ログインエラー: ${error.message}`);
                    setSyncStatus('error');
                } else {
                    authPassword.value = '';
                }
            }
        });

        // ログアウト処理
        btnLogout.addEventListener('click', async () => {
            if (confirm('ログアウトしますか？')) {
                if (timerInterval) btnStop.click(); // タイマー動作中なら安全のために強制終了
                await supabaseClient.auth.signOut();
                AppState = { level: 1, exp: 0, taskLogs: [] };
                updateStatusUI();
                renderCalendar();
                renderLogs();
            }
        });

        // --- 2. 状態管理（Supabase連携版セーブ＆ロード） ---
        async function saveProfileToSupabase() {
            if (!userId) return;
            setSyncStatus('syncing');
            const { error } = await supabaseClient
                .from('user_profiles')
                .upsert({ 
                    user_id: userId, 
                    level: AppState.level, 
                    exp: AppState.exp,
                    updated_at: new Date().toISOString()
                });
            
            if (error) {
                console.error('プロファイル同期エラー:', error);
                setSyncStatus('error');
            } else {
                setSyncStatus('success');
            }
        }

        async function loadStateFromSupabase() {
            if (!userId) return;
            setSyncStatus('syncing');
            try {
                // 1. レベル・EXPプロファイルのロード
                const { data: profile, error: pError } = await supabaseClient
                    .from('user_profiles')
                    .select('level, exp')
                    .eq('user_id', userId)
                    .single();

                if (pError && pError.code !== 'PGRST116') { 
                    throw pError;
                }

                if (profile) {
                    AppState.level = profile.level;
                    AppState.exp = profile.exp;
                } else {
                    await supabaseClient.from('user_profiles').insert({ user_id: userId, level: 1, exp: 0 });
                }

                // 2. 全タスク実績ログのロード
                const { data: logs, error: lError } = await supabaseClient
                    .from('task_logs')
                    .select('*')
                    .eq('user_id', userId)
                    .order('end_time', { ascending: true });

                if (lError) throw lError;

                AppState.taskLogs = logs.map(log => ({
                    id: log.id,
                    taskName: log.task_name,
                    startTime: log.start_time,
                    endTime: log.end_time,
                    durationSeconds: log.duration_seconds,
                    expGained: log.exp_gained
                }));

                setSyncStatus('success');
            } catch (e) {
                console.error('Supabaseからのロードに失敗しました。', e);
                setSyncStatus('error');
            }

            updateStatusUI();
            renderLogs();
            renderCalendar();
            setupTabEvents();
        }

        function getDateKey(date) {
            const y = date.getFullYear();
            const m = (date.getMonth() + 1).toString().padStart(2, '0');
            const d = date.getDate().toString().padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        function getFilteredLogsByDate(date) {
            const targetKey = getDateKey(date);
            return AppState.taskLogs.filter(log => getDateKey(new Date(log.endTime)) === targetKey);
        }

        // --- 3. UI更新用の関数 ---
        function updateStatusUI() {
            const nextLevelExp = AppState.level * EXP_BASE;
            const progressPercent = Math.min((AppState.exp / nextLevelExp) * 100, 100);

            document.getElementById('user-level').innerText = AppState.level;
            document.getElementById('user-exp-text').innerText = `${AppState.exp} / ${nextLevelExp} EXP`;
            document.getElementById('exp-bar').style.width = `${progressPercent}%`;
        }

        function hasLogsOnDate(year, month, day) {
            const checkKey = getDateKey(new Date(year, month, day));
            return AppState.taskLogs.some(log => getDateKey(new Date(log.endTime)) === checkKey);
        }

        // --- 4. 動的カレンダー生成ロジック ---
        function renderCalendar() {
            const daysContainer = document.getElementById('calendar-days');
            const monthYearTitle = document.getElementById('calendar-month-year');
            daysContainer.innerHTML = '';

            const year = calendarCurrentMonthDate.getFullYear();
            const month = calendarCurrentMonthDate.getMonth();

            monthYearTitle.innerText = `${year}年 ${(month + 1)}月`;

            const firstDayIndex = new Date(year, month, 1).getDay();
            const totalDays = new Date(year, month + 1, 0).getDate();

            for (let i = 0; i < firstDayIndex; i++) {
                daysContainer.appendChild(document.createElement('div'));
            }

            const todayKey = getDateKey(new Date());
            const selectedKey = getDateKey(currentSelectedDate);

            for (let day = 1; day <= totalDays; day++) {
                const dayBtn = document.createElement('button');
                dayBtn.innerText = day;
                
                const currentLoopKey = getDateKey(new Date(year, month, day));
                const isSelected = (currentLoopKey === selectedKey);
                const isToday = (currentLoopKey === todayKey);

                if (isSelected) {
                    dayBtn.className = "h-8 w-8 mx-auto flex flex-col items-center justify-center rounded-full text-xs font-bold transition relative cursor-pointer active:scale-90 bg-indigo-600 text-white shadow-xs";
                } else if (isToday) {
                    dayBtn.className = "h-8 w-8 mx-auto flex flex-col items-center justify-center rounded-full text-xs font-bold transition relative cursor-pointer active:scale-90 border-2 border-indigo-600 text-indigo-600";
                } else {
                    dayBtn.className = "h-8 w-8 mx-auto flex flex-col items-center justify-center rounded-full text-xs font-medium transition relative cursor-pointer active:scale-90 text-slate-600 hover:bg-slate-100";
                }

                if (hasLogsOnDate(year, month, day)) {
                    const dot = document.createElement('span');
                    dot.className = `w-1 h-1 rounded-full absolute bottom-1 ${isSelected ? 'bg-white' : 'bg-emerald-500'}`;
                    dayBtn.appendChild(dot);
                }

                dayBtn.addEventListener('click', () => {
                    currentSelectedDate = new Date(year, month, day);
                    renderCalendar(); 
                    renderLogs();     
                });

                daysContainer.appendChild(dayBtn);
            }
        }

        document.getElementById('btn-prev-month').addEventListener('click', () => {
            calendarCurrentMonthDate.setMonth(calendarCurrentMonthDate.getMonth() - 1);
            renderCalendar();
        });
        document.getElementById('btn-next-month').addEventListener('click', () => {
            calendarCurrentMonthDate.setMonth(calendarCurrentMonthDate.getMonth() + 1);
            renderCalendar();
        });

        // --- 5. 実績ログの描画ロジック ---
        function renderLogs() {
            const tbody = document.getElementById('log-table-body');
            tbody.innerHTML = '';

            const targetYear = currentSelectedDate.getFullYear();
            const targetMonth = currentSelectedDate.getMonth();
            const targetDay = currentSelectedDate.getDate();

            const formattedDate = `${targetYear}/${(targetMonth + 1).toString().padStart(2, '0')}/${targetDay.toString().padStart(2, '0')}`;
            document.getElementById('target-date-display').innerText = formattedDate;
            document.getElementById('record-title-date').innerText = `${(targetMonth + 1)}/${targetDay}`;

            const filteredLogs = getFilteredLogsByDate(currentSelectedDate);

            renderUnifiedChart(filteredLogs, currentSelectedDate);

            const displayLogs = [...filteredLogs].reverse().slice(0, 5);

            if (displayLogs.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="py-8 text-center text-slate-400 text-xs">選択された日のタスク実績はありません</td></tr>`;
                return;
            }

            displayLogs.forEach(log => {
                const date = new Date(log.endTime);
                const timeString = `${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}`;
                
                const hrs = Math.floor(log.durationSeconds / 3600).toString().padStart(2, '0');
                const mins = Math.floor((log.durationSeconds % 3600) / 60).toString().padStart(2, '0');
                const secs = (log.durationSeconds % 60).toString().padStart(2, '0');
                const durationString = `${hrs}:${mins}:${secs}`;

                const taskNameDisplay = log.taskName ? log.taskName : '名無しのタスク';

                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50 transition-colors text-xs text-slate-600 align-middle";
                tr.innerHTML = `
                    <td class="py-3 pl-1 font-medium text-slate-700 max-w-[160px] truncate" title="${taskNameDisplay}">${taskNameDisplay}</td>
                    <td class="py-3 text-slate-400 font-mono">${timeString}</td>
                    <td class="py-3 font-mono text-slate-500">${durationString}</td>
                    <td class="py-3 pr-1 text-emerald-600 font-bold text-right font-mono">+${log.expGained}</td>
                    <td class="py-3 pr-1 text-right">
                        <button data-delete-log-id="${log.id}" class="text-slate-400 hover:text-rose-600 transition cursor-pointer p-1" title="このログを削除">🗑️</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // --- 6. 経験値＆逆算レベルアップロジック ---
        function recalculateLevelFromTotalExp(totalExp) {
            let currentTotal = Math.max(0, totalExp);
            let newLevel = 1;
            
            while (true) {
                const requiredExp = newLevel * EXP_BASE;
                if (currentTotal >= requiredExp) {
                    currentTotal -= requiredExp;
                    newLevel++;
                } else {
                    break;
                }
            }
            
            AppState.level = newLevel;
            AppState.exp = currentTotal;
        }

        async function deductExp(amount) {
            let total = 0;
            for (let i = 1; i < AppState.level; i++) {
                total += i * EXP_BASE;
            }
            total += AppState.exp;

            recalculateLevelFromTotalExp(total - amount);
            await saveProfileToSupabase();
        }

        async function deleteLogById(logId) {
            const index = AppState.taskLogs.findIndex(log => log.id === logId);
            if (index === -1) return;

            setSyncStatus('syncing');
            const { error } = await supabaseClient
                .from('task_logs')
                .delete()
                .eq('id', logId);

            if (error) {
                console.error('Supabaseからのログ削除に失敗:', error);
                setSyncStatus('error');
                alert('ログの削除に失敗しました。');
                return;
            }

            const removedLog = AppState.taskLogs[index];
            AppState.taskLogs.splice(index, 1);
            
            await deductExp(removedLog.expGained || 0);

            updateStatusUI();
            renderLogs();
            renderCalendar();
        }

        // --- 7. タブ切り替え統合グラフ描画ロジック ---
        function renderUnifiedChart(dayLogs, baseDate) {
            const ctx = document.getElementById('taskChart').getContext('2d');
            const noDataEl = document.getElementById('no-chart-data');

            if (globalChartInstance) {
                globalChartInstance.destroy();
            }

            if (currentGraphTab === 'daily') {
                if (!dayLogs || dayLogs.length === 0) {
                    noDataEl.classList.remove('hidden');
                    return;
                } else {
                    noDataEl.classList.add('hidden');
                }

                const taskSummary = {};
                dayLogs.forEach(log => {
                    const name = log.taskName ? log.taskName.trim() : '名無しのタスク';
                    const min = log.durationSeconds / 60;
                    taskSummary[name] = (taskSummary[name] || 0) + min;
                });

                const labels = Object.keys(taskSummary);
                const dataValues = Object.values(taskSummary).map(v => Math.round(v * 10) / 10);

                globalChartInstance = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: labels,
                        datasets: [{
                            data: dataValues,
                            backgroundColor: ['#4f46e5', '#10b981', '#f59e0b', '#ec4899', '#3b82f6', '#8b5cf6'],
                            borderWidth: 2,
                            borderColor: '#ffffff'
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        layout: { padding: { top: 10, bottom: 10, left: 10, right: 10 } },
                        plugins: {
                            legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 10 } } },
                            tooltip: {
                                callbacks: {
                                    label: function(context) { return ` ${context.label}: ${context.raw} 分`; }
                                }
                            }
                        }
                    }
                });

            } else if (currentGraphTab === 'weekly') {
                noDataEl.classList.add('hidden');

                const dateLabels = [];
                const dateKeys = [];
                for (let i = 6; i >= 0; i--) {
                    const d = new Date(baseDate.getTime());
                    d.setDate(baseDate.getDate() - i);
                    dateLabels.push(`${d.getMonth() + 1}/${d.getDate()}`);
                    dateKeys.push(getDateKey(d));
                }

                const weeklyMinutes = new Array(7).fill(0);
                AppState.taskLogs.forEach(log => {
                    const logDate = new Date(log.endTime);
                    const logKey = getDateKey(logDate);
                    const idx = dateKeys.indexOf(logKey);
                    if (idx !== -1) {
                        weeklyMinutes[idx] += log.durationSeconds / 60;
                    }
                });

                const roundedWeeklyMinutes = weeklyMinutes.map(v => Math.round(v * 10) / 10);

                globalChartInstance = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: dateLabels,
                        datasets: [{
                            data: roundedWeeklyMinutes,
                            backgroundColor: 'rgba(79, 70, 229, 0.85)',
                            hoverBackgroundColor: '#4f46e5',
                            borderRadius: 4
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        layout: { padding: { top: 10, bottom: 5, left: 5, right: 5 } },
                        scales: {
                            y: { 
                                beginAtZero: true, 
                                ticks: { font: { size: 9 } }, 
                                grid: { color: '#f1f5f9' },
                                title: { display: true, text: '分', font: { size: 9 } }
                            },
                            x: { ticks: { font: { size: 9 } }, grid: { display: false } }
                        },
                        plugins: { 
                            legend: { display: false },
                            tooltip: {
                                callbacks: {
                                    label: function(context) { return ` 作業時間: ${context.raw} 分`; }
                                }
                            }
                        }
                    }
                });
            }
        }

        function setupTabEvents() {
            const tabDaily = document.getElementById('tab-daily');
            const tabWeekly = document.getElementById('tab-weekly');
            const activeClass = "px-2.5 py-1 text-xs font-bold rounded-md bg-white text-indigo-600 shadow-xs cursor-pointer transition";
            const inactiveClass = "px-2.5 py-1 text-xs font-medium rounded-md text-slate-500 hover:text-slate-800 cursor-pointer transition";

            const switchTab = (tab) => {
                currentGraphTab = tab;
                tabDaily.className = tab === 'daily' ? activeClass : inactiveClass;
                tabWeekly.className = tab === 'weekly' ? activeClass : inactiveClass;
                renderLogs();
            };

            tabDaily.addEventListener('click', () => switchTab('daily'));
            tabWeekly.addEventListener('click', () => switchTab('weekly'));
        }

        // --- 8. 経験値の獲得ロジック ---
        async function gainExp(amount) {
            AppState.exp += amount;
            let leveledUp = false;

            while (AppState.exp >= AppState.level * EXP_BASE) {
                AppState.exp -= AppState.level * EXP_BASE;
                AppState.level += 1;
                leveledUp = true;
            }

            updateStatusUI();
            await saveProfileToSupabase();

            if (leveledUp) {
                alert(`🎉 レベルアップ！ Lv.${AppState.level} になりました！`);
            }
        }

        // --- 9. タイマー機能のロジック ---
        function runTimerDisplayUpdate() {
            const elapsed = Math.floor((Date.now() - timerStartTime) / 1000);
            const hrs = Math.floor(elapsed / 3600).toString().padStart(2, '0');
            const mins = Math.floor((elapsed % 3600) / 60).toString().padStart(2, '0');
            const secs = (elapsed % 60).toString().padStart(2, '0');
            timerDisplay.innerText = `${hrs}:${mins}:${secs}`;
        }

        function checkAndResumeTimer() {
            const savedStartTime = localStorage.getItem(RUNNING_TIMER_START_KEY);
            const savedTaskName = localStorage.getItem(RUNNING_TIMER_NAME_KEY);

            if (savedStartTime) {
                timerStartTime = parseInt(savedStartTime, 10);
                taskNameInput.value = savedTaskName || '';

                btnStart.classList.add('hidden');
                btnStop.classList.remove('hidden');
                taskNameInput.disabled = true;
                taskNameInput.classList.add('bg-slate-100', 'text-slate-400');

                runTimerDisplayUpdate();
                timerInterval = setInterval(runTimerDisplayUpdate, 250);
            }
        }

        btnStart.addEventListener('click', () => {
            const currentTaskName = taskNameInput.value.trim();
            
            if (!currentTaskName) {
                alert('計測を開始するにはタスク名を入力してください。');
                return;
            }

            btnStart.classList.add('hidden');
            btnStop.classList.remove('hidden');
            taskNameInput.disabled = true;
            taskNameInput.classList.add('bg-slate-100', 'text-slate-400');

            timerStartTime = Date.now();
            
            localStorage.setItem(RUNNING_TIMER_START_KEY, timerStartTime.toString());
            localStorage.setItem(RUNNING_TIMER_NAME_KEY, currentTaskName);

            timerInterval = setInterval(runTimerDisplayUpdate, 250);
        });

        btnStop.addEventListener('click', async () => {
            if (!timerInterval) return;
            clearInterval(timerInterval);
            timerInterval = null;

            const durationSeconds = Math.floor((Date.now() - timerStartTime) / 1000);
            timerStartTime = null;
            timerDisplay.innerText = "00:00:00";
            btnStart.classList.remove('hidden');
            btnStop.classList.add('hidden');
            taskNameInput.disabled = false;
            taskNameInput.classList.remove('bg-slate-100', 'text-slate-400');

            localStorage.removeItem(RUNNING_TIMER_START_KEY);
            localStorage.removeItem(RUNNING_TIMER_NAME_KEY);

            if (durationSeconds < 5) {
                alert('計測時間が5秒未満のため、実績ログには記録されませんでした。');
                taskNameInput.value = '';
                return;
            }

            const expGained = durationSeconds; 
            const currentTaskName = taskNameInput.value.trim();
            const now = new Date();
            const generatedId = crypto.randomUUID ? crypto.randomUUID() : 'log_' + Date.now();

            const newLog = {
                id: generatedId,
                taskName: currentTaskName,
                startTime: new Date(now.getTime() - (durationSeconds * 1000)).toISOString(),
                endTime: now.toISOString(),
                durationSeconds: durationSeconds,
                expGained: expGained
            };

            setSyncStatus('syncing');
            const { error } = await supabaseClient
                .from('task_logs')
                .insert([{
                    id: newLog.id,
                    user_id: userId,
                    task_name: newLog.taskName,
                    start_time: newLog.startTime,
                    end_time: newLog.endTime,
                    duration_seconds: newLog.durationSeconds,
                    exp_gained: newLog.expGained
                }]);

            if (error) {
                console.error('Supabaseへのタスク保存に失敗しました:', error);
                setSyncStatus('error');
                alert('クラウドへのタスク保存に失敗しました。');
                return;
            }

            AppState.taskLogs.push(newLog);
            
            currentSelectedDate = new Date();
            calendarCurrentMonthDate = new Date();
            
            renderCalendar();
            renderLogs();
            
            await gainExp(expGained);
            taskNameInput.value = '';
        });

        document.getElementById('log-table-body').addEventListener('click', (event) => {
            const target = event.target.closest('[data-delete-log-id]');
            if (!target) return;
            const logId = target.getAttribute('data-delete-log-id');
            if (logId) deleteLogById(logId);
        });

        btnResetAll.addEventListener('click', async () => {
            if (confirm('【注意】クラウドに保存されているすべての実績ログ、レベル、データが完全に消去されます。よろしいですか？')) {
                setSyncStatus('syncing');
                
                const { error: lError } = await supabaseClient.from('task_logs').delete().eq('user_id', userId);
                const { error: pError } = await supabaseClient.from('user_profiles').upsert({ user_id: userId, level: 1, exp: 0 });

                if (lError || pError) {
                    console.error('初期化エラー:', lError, pError);
                    setSyncStatus('error');
                    alert('データの初期化中にエラーが発生しました。');
                    return;
                }

                localStorage.removeItem(RUNNING_TIMER_START_KEY);
                localStorage.removeItem(RUNNING_TIMER_NAME_KEY);
                
                AppState = { level: 1, exp: 0, taskLogs: [] };
                timerStartTime = null;
                if(timerInterval) clearInterval(timerInterval);
                timerDisplay.innerText = "00:00:00";
                
                btnStart.classList.remove('hidden');
                btnStop.classList.add('hidden');
                taskNameInput.disabled = false;
                taskNameInput.classList.remove('bg-slate-100', 'text-slate-400');
                taskNameInput.value = '';

                currentSelectedDate = new Date();
                calendarCurrentMonthDate = new Date();

                updateStatusUI();
                renderCalendar();
                renderLogs();
                setSyncStatus('success');
                alert('すべてのデータを初期化しました。');
            }
        });

        // --- 10. アプリ起動時の初期化処理 ---
        window.addEventListener('DOMContentLoaded', async () => {
            // Supabaseの認証ステータスの変化を24時間常に監視するリスナーを設置
            supabaseClient.auth.onAuthStateChange((event, session) => {
                handleAuthStateChange(session);
            });

            checkAndResumeTimer(); 
        });

    </script>
</body>
