<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>社内AI活用コンペ - タスク管理アプリ</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; }

        @keyframes aiPulse {
            0% { opacity: 0.35; transform: scale(0.98); }
            50% { opacity: 1; transform: scale(1); }
            100% { opacity: 0.35; transform: scale(0.98); }
        }

        @keyframes aiDots {
            0%, 20% { content: ''; }
            40% { content: '.'; }
            60% { content: '..'; }
            80%, 100% { content: '...'; }
        }

        .ai-loading-chip {
            animation: aiPulse 1.2s ease-in-out infinite;
        }

        .ai-loading-dots::after {
            display: inline-block;
            min-width: 1.2em;
            content: '';
            animation: aiDots 1.2s steps(1, end) infinite;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">

    <header class="bg-slate-900 text-white p-4 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-wider">AIコンペ開発システム</h1>
            <div class="flex items-center gap-4">
                <div class="bg-slate-800 px-3 py-1 rounded-full border border-slate-700">
                    <span class="text-xs text-amber-400 font-bold">Lv.</span>
                    <span id="user-level" class="text-sm font-bold">1</span>
                </div>
                <div class="w-32 bg-slate-700 h-2.5 rounded-full overflow-hidden">
                    <div id="exp-bar" class="bg-amber-400 h-full transition-all duration-300" style="width: 0%"></div>
                </div>
                <span id="user-exp-text" class="text-xs text-slate-400">0 / 100 EXP</span>
            </div>
        </div>
    </header>

    <main class="flex-1 container mx-auto p-4 max-w-6xl my-6 grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <div class="flex flex-col gap-6">
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
                <div class="flex justify-between items-center mb-4">
                    <h2 id="calendar-month-year" class="text-base font-bold text-slate-700">2026年 5月</h2>
                    <div class="flex gap-1">
                        <button id="btn-prev-month" class="p-1.5 hover:bg-slate-100 rounded-lg text-slate-600 transition cursor-pointer">◀</button>
                        <button id="btn-next-month" class="p-1.5 hover:bg-slate-100 rounded-lg text-slate-600 transition cursor-pointer">▶</button>
                    </div>
                </div>
                <div class="grid grid-cols-7 gap-1 text-center text-xs font-bold text-slate-400 mb-2">
                    <div class="text-rose-500">日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div class="text-indigo-500">土</div>
                </div>
                <div id="calendar-days" class="grid grid-cols-7 gap-1 text-center text-sm">
                </div>
            </div>

            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex flex-col h-[320px]">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-sm font-bold text-slate-700 flex items-center gap-1.5">
                        📊 データの可視化
                    </h2>
                    <div class="flex bg-slate-100 p-0.5 rounded-lg border border-slate-200">
                        <button id="tab-daily" class="px-2.5 py-1 text-xs font-bold rounded-md bg-white text-indigo-600 shadow-xs cursor-pointer transition">本日</button>
                        <button id="tab-weekly" class="px-2.5 py-1 text-xs font-medium rounded-md text-slate-500 hover:text-slate-800 cursor-pointer transition">週間</button>
                    </div>
                </div>
                
                <div class="flex-1 relative flex items-center justify-center min-h-0">
                    <div class="absolute inset-0 w-full h-full p-2">
                        <canvas id="taskChart"></canvas>
                    </div>
                    <div id="no-chart-data" class="absolute inset-0 flex items-center justify-center bg-white/90 text-slate-400 text-xs font-medium hidden">
                        この日の作業グラフはありません
                    </div>
                </div>
            </div>
        </div>
        
        <div class="md:col-span-2 grid grid-cols-1 lg:grid-cols-5 gap-6 h-fit">
            
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 lg:col-span-2 flex flex-col justify-between min-h-[320px]">
                <div>
                    <div class="flex justify-between items-center mb-3">
                        <h2 class="text-sm font-bold flex items-center gap-1.5">
                            <span class="inline-block w-1.5 h-3.5 bg-indigo-600 rounded"></span>タスクの計測
                        </h2>
                    </div>
                    <div class="text-center text-xs font-bold text-indigo-600 bg-indigo-50 py-1.5 rounded-full border border-indigo-100 mb-6">
                        選択日: <span id="target-date-display">----/--/--</span>
                    </div>
                </div>
                
                <div class="flex flex-col items-center justify-center py-6 bg-slate-50 rounded-xl border border-slate-200 px-4 flex-1">
                    <div class="w-full mb-4">
                        <input type="text" id="task-name-input" placeholder="タスク名を入力..." class="w-full bg-white border border-slate-200 rounded-xl px-3 py-2 text-xs focus:outline-none focus:border-indigo-500 transition shadow-inner">
                    </div>

                    <div id="timer-display" class="text-4xl font-mono font-bold tracking-tight text-slate-700 mb-6">00:00:00</div>
                    
                    <div class="flex gap-2 w-full">
                        <button id="btn-start" class="flex-1 py-2.5 bg-indigo-600 text-white text-xs font-medium rounded-lg hover:bg-indigo-700 transition shadow-sm active:scale-95 cursor-pointer">計測開始</button>
                        <button id="btn-stop" class="flex-1 py-2.5 bg-rose-600 text-white text-xs font-medium rounded-lg hover:bg-rose-700 transition shadow-sm active:scale-95 cursor-pointer hidden">計測終了</button>
                    </div>
                </div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 lg:col-span-3 flex flex-col min-h-[320px]">
                <h2 class="text-sm font-bold mb-4 flex items-center gap-1.5">
                    <span class="inline-block w-1.5 h-3.5 bg-emerald-500 rounded"></span><span id="record-title-date">選択日</span>の実績
                </h2>
                <div class="overflow-x-auto flex-1">
                    <table class="w-full text-left text-xs text-slate-600">
                        <thead>
                            <tr class="border-b border-slate-100 font-bold text-slate-400 pb-2">
                                <th class="py-2 pl-1">タスク名</th>
                                <th class="py-2">完了時刻</th>
                                <th class="py-2">作業時間</th>
                                <th class="py-2 pr-1 text-right">獲得EXP</th>
                                <th class="py-2 pr-1 text-right">操作</th>
                            </tr>
                        </thead>
                        <tbody id="log-table-body" class="divide-y divide-slate-50">
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 lg:col-span-5">
                <div class="flex flex-wrap items-center justify-between gap-3 mb-4">
                    <h2 class="text-sm font-bold flex items-center gap-1.5">
                        <span class="inline-block w-1.5 h-3.5 bg-fuchsia-500 rounded"></span>AIワンボタン日報
                    </h2>
                    <div class="flex gap-2">
                        <button id="btn-generate-ai-report" class="px-3 py-2 bg-fuchsia-600 text-white text-xs font-semibold rounded-lg hover:bg-fuchsia-700 transition cursor-pointer">AI日報を生成</button>
                        <button id="btn-delete-ai-report" class="px-3 py-2 bg-slate-200 text-slate-600 text-xs font-semibold rounded-lg hover:bg-slate-300 transition cursor-pointer hidden">日報を削除</button>
                    </div>
                </div>

                <div id="ai-report-loading" class="hidden bg-fuchsia-50 border border-fuchsia-100 rounded-xl p-4 text-fuchsia-700 text-sm">
                    <div class="ai-loading-chip inline-flex items-center gap-2 px-3 py-1 rounded-full bg-white border border-fuchsia-200 text-xs font-bold">
                        <span>AI分析中</span><span class="ai-loading-dots"></span>
                    </div>
                    <p class="mt-3 text-xs text-fuchsia-600">選択日のタスクログから、業務要約と生産性コメントを生成しています。</p>
                </div>

                <div id="ai-report-empty" class="text-xs text-slate-400 bg-slate-50 rounded-xl p-4 border border-slate-100">
                    この日のAI日報は未作成です。「AI日報を生成」を押すと保存されます。
                </div>

                <article id="ai-report-content" class="hidden bg-slate-50 rounded-xl p-4 border border-slate-100">
                    <h3 id="ai-report-title" class="text-sm font-bold text-slate-700 mb-3"></h3>
                    <div class="space-y-3 text-xs text-slate-600 leading-6">
                        <section>
                            <p class="font-bold text-slate-700 mb-1">業務サマリー</p>
                            <p id="ai-report-summary"></p>
                        </section>
                        <section>
                            <p class="font-bold text-slate-700 mb-1">生産性分析</p>
                            <p id="ai-report-analysis"></p>
                        </section>
                        <section>
                            <p class="font-bold text-slate-700 mb-1">翌日へのアドバイス</p>
                            <p id="ai-report-advice"></p>
                        </section>
                    </div>
                </article>
            </div>
            
        </div>

    </main>

    <footer class="bg-slate-100 text-center py-4 text-xs text-slate-400 border-t border-slate-200 mt-auto flex justify-between items-center px-6">
        <div>&copy; 2026 社内AI活用コンペ開発チーム</div>
        <button id="btn-reset-all" class="text-slate-400 hover:text-rose-500 font-medium transition cursor-pointer text-xs">⚠️ 全データを初期化</button>
    </footer>

    <script>
        // --- 1. アプリ全体のデータ構造・定数 ---
        let AppState = {
            level: 1,
            exp: 0,
            taskLogs: []
        };

        const STORAGE_KEY = 'ai_comp_app_state';
        const AI_REPORTS_KEY = 'aiReports';
        const EXP_BASE = 100; 

        // F5リロード対策用の一時ストレージキー
        const RUNNING_TIMER_START_KEY = 'ai_comp_running_timer_start';
        const RUNNING_TIMER_NAME_KEY = 'ai_comp_running_timer_name';
        
        let aiReports = {};
        let currentSelectedDate = new Date();
        let calendarCurrentMonthDate = new Date();

        let globalChartInstance = null;
        let currentGraphTab = 'daily';

        let timerInterval = null;
        let timerStartTime = null; 

        // DOM要素の取得
        const timerDisplay = document.getElementById('timer-display');
        const btnStart = document.getElementById('btn-start');
        const btnStop = document.getElementById('btn-stop');
        const taskNameInput = document.getElementById('task-name-input');
        const btnGenerateAIReport = document.getElementById('btn-generate-ai-report');
        const btnDeleteAIReport = document.getElementById('btn-delete-ai-report');
        const aiReportLoading = document.getElementById('ai-report-loading');
        const btnResetAll = document.getElementById('btn-reset-all');

        // --- 2. 状態管理（セーブ＆ロード） ---
        function saveStateToLocalStorage() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(AppState));
        }

        function loadStateFromLocalStorage() {
            const savedData = localStorage.getItem(STORAGE_KEY);
            if (savedData) {
                try { AppState = JSON.parse(savedData); } catch (e) { console.error('データ読み込み失敗。', e); }
            }

            const savedReports = localStorage.getItem(AI_REPORTS_KEY);
            if (savedReports) {
                try { aiReports = JSON.parse(savedReports); } catch (e) { console.error('AI日報の読み込み失敗。', e); aiReports = {}; }
            }

            updateStatusUI();
            renderLogs();
            renderCalendar();
            setupTabEvents();
        }

        function saveAIReportsToLocalStorage() {
            localStorage.setItem(AI_REPORTS_KEY, JSON.stringify(aiReports));
        }

        function getDateKey(date) {
            const y = date.getFullYear();
            const m = (date.getMonth() + 1).toString().padStart(2, '0');
            const d = date.getDate().toString().padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        function getFilteredLogsByDate(date) {
            const targetKey = getDateKey(date);
            return AppState.taskLogs.filter(log => getDateKey(new Date(log.endTime)) === targetKey);
        }

        // --- 3. UI更新用の関数 ---
        function updateStatusUI() {
            const nextLevelExp = AppState.level * EXP_BASE;
            const progressPercent = Math.min((AppState.exp / nextLevelExp) * 100, 100);

            document.getElementById('user-level').innerText = AppState.level;
            document.getElementById('user-exp-text').innerText = `${AppState.exp} / ${nextLevelExp} EXP`;
            document.getElementById('exp-bar').style.width = `${progressPercent}%`;
        }

        function hasLogsOnDate(year, month, day) {
            const checkKey = getDateKey(new Date(year, month, day));
            return AppState.taskLogs.some(log => getDateKey(new Date(log.endTime)) === checkKey);
        }

        // --- 4. 動的カレンダー生成ロジック ---
        function renderCalendar() {
            const daysContainer = document.getElementById('calendar-days');
            const monthYearTitle = document.getElementById('calendar-month-year');
            daysContainer.innerHTML = '';

            const year = calendarCurrentMonthDate.getFullYear();
            const month = calendarCurrentMonthDate.getMonth();

            monthYearTitle.innerText = `${year}年 ${(month + 1)}月`;

            const firstDayIndex = new Date(year, month, 1).getDay();
            const totalDays = new Date(year, month + 1, 0).getDate();

            for (let i = 0; i < firstDayIndex; i++) {
                daysContainer.appendChild(document.createElement('div'));
            }

            const todayKey = getDateKey(new Date());
            const selectedKey = getDateKey(currentSelectedDate);

            for (let day = 1; day <= totalDays; day++) {
                const dayBtn = document.createElement('button');
                dayBtn.innerText = day;
                
                const currentLoopKey = getDateKey(new Date(year, month, day));
                const isSelected = (currentLoopKey === selectedKey);
                const isToday = (currentLoopKey === todayKey);

                if (isSelected) {
                    dayBtn.className = "h-8 w-8 mx-auto flex flex-col items-center justify-center rounded-full text-xs font-bold transition relative cursor-pointer active:scale-90 bg-indigo-600 text-white shadow-sm";
                } else if (isToday) {
                    dayBtn.className = "h-8 w-8 mx-auto flex flex-col items-center justify-center rounded-full text-xs font-bold transition relative cursor-pointer active:scale-90 border-2 border-indigo-600 text-indigo-600";
                } else {
                    dayBtn.className = "h-8 w-8 mx-auto flex flex-col items-center justify-center rounded-full text-xs font-medium transition relative cursor-pointer active:scale-90 text-slate-600 hover:bg-slate-100";
                }

                if (hasLogsOnDate(year, month, day)) {
                    const dot = document.createElement('span');
                    dot.className = `w-1 h-1 rounded-full absolute bottom-1 ${isSelected ? 'bg-white' : 'bg-emerald-500'}`;
                    dayBtn.appendChild(dot);
                }

                dayBtn.addEventListener('click', () => {
                    currentSelectedDate = new Date(year, month, day);
                    renderCalendar(); 
                    renderLogs();     
                });

                daysContainer.appendChild(dayBtn);
            }
        }

        document.getElementById('btn-prev-month').addEventListener('click', () => {
            calendarCurrentMonthDate.setMonth(calendarCurrentMonthDate.getMonth() - 1);
            renderCalendar();
        });
        document.getElementById('btn-next-month').addEventListener('click', () => {
            calendarCurrentMonthDate.setMonth(calendarCurrentMonthDate.getMonth() + 1);
            renderCalendar();
        });

        // --- 5. 実績ログの描画ロジック ---
        function renderLogs() {
            const tbody = document.getElementById('log-table-body');
            tbody.innerHTML = '';

            const targetYear = currentSelectedDate.getFullYear();
            const targetMonth = currentSelectedDate.getMonth();
            const targetDay = currentSelectedDate.getDate();

            const formattedDate = `${targetYear}/${(targetMonth + 1).toString().padStart(2, '0')}/${targetDay.toString().padStart(2, '0')}`;
            document.getElementById('target-date-display').innerText = formattedDate;
            document.getElementById('record-title-date').innerText = `${(targetMonth + 1)}/${targetDay}`;

            const filteredLogs = getFilteredLogsByDate(currentSelectedDate);

            renderUnifiedChart(filteredLogs, currentSelectedDate);
            renderAIReportPanel(filteredLogs);

            const displayLogs = [...filteredLogs].reverse().slice(0, 5);

            if (displayLogs.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="py-8 text-center text-slate-400 text-xs">本日記録されたタスク実績はありません</td></tr>`;
                return;
            }

            displayLogs.forEach(log => {
                const date = new Date(log.endTime);
                const timeString = `${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}`;
                
                const hrs = Math.floor(log.durationSeconds / 3600).toString().padStart(2, '0');
                const mins = Math.floor((log.durationSeconds % 3600) / 60).toString().padStart(2, '0');
                const secs = (log.durationSeconds % 60).toString().padStart(2, '0');
                const durationString = `${hrs}:${mins}:${secs}`;

                const taskNameDisplay = log.taskName ? log.taskName : '名無しのタスク';

                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50 transition-colors text-xs text-slate-600";
                tr.innerHTML = `
                    <td class="py-2.5 pl-1 font-medium text-slate-700 max-w-[160px] truncate" title="${taskNameDisplay}">${taskNameDisplay}</td>
                    <td class="py-2.5 text-slate-400">${timeString}</td>
                    <td class="py-2.5 font-mono text-slate-500">${durationString}</td>
                    <td class="py-2.5 pr-1 text-emerald-600 font-bold text-right">+${log.expGained}</td>
                    <td class="py-2.5 pr-1 text-right">
                        <button data-delete-log-id="${log.id}" class="text-slate-400 hover:text-rose-600 transition cursor-pointer" title="このログを削除">🗑️</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function renderAIReportPanel(dayLogs) {
            const dateKey = getDateKey(currentSelectedDate);
            const report = aiReports[dateKey];
            const emptyEl = document.getElementById('ai-report-empty');
            const contentEl = document.getElementById('ai-report-content');
            const deleteBtn = document.getElementById('btn-delete-ai-report');

            if (!report) {
                emptyEl.classList.remove('hidden');
                contentEl.classList.add('hidden');
                deleteBtn.classList.add('hidden');

                if (!dayLogs || dayLogs.length === 0) {
                    emptyEl.innerText = 'この日はログがないため、AI日報を生成できません。まずタスク計測を記録してください。';
                } else {
                    emptyEl.innerText = 'この日のAI日報は未作成です。「AI日報を生成」を押すと保存されます。';
                }
                return;
            }

            emptyEl.classList.add('hidden');
            contentEl.classList.remove('hidden');
            deleteBtn.classList.remove('hidden');

            const labelDate = `${currentSelectedDate.getFullYear()}年${currentSelectedDate.getMonth() + 1}月${currentSelectedDate.getDate()}日`;
            document.getElementById('ai-report-title').innerText = `${labelDate} のAI日報`;
            document.getElementById('ai-report-summary').innerText = report.summary;
            document.getElementById('ai-report-analysis').innerText = report.analysis;
            document.getElementById('ai-report-advice').innerText = report.advice;
        }

        function generateAIReportFromLogs(dayLogs) {
            const totalSeconds = dayLogs.reduce((acc, log) => acc + (log.durationSeconds || 0), 0);
            const totalMinutes = Math.max(1, Math.round(totalSeconds / 60));
            const totalExp = dayLogs.reduce((acc, log) => acc + (log.expGained || 0), 0);

            const taskMinutes = {};
            dayLogs.forEach(log => {
                const taskName = (log.taskName && log.taskName.trim()) ? log.taskName.trim() : '名無しのタスク';
                taskMinutes[taskName] = (taskMinutes[taskName] || 0) + Math.max(1, Math.round((log.durationSeconds || 0) / 60));
            });

            const sortedTasks = Object.entries(taskMinutes).sort((a, b) => b[1] - a[1]);
            const topTask = sortedTasks[0];
            const taskCount = Object.keys(taskMinutes).length;
            const focusRatio = topTask ? Math.round((topTask[1] / totalMinutes) * 100) : 0;

            let workloadTone = '安定稼働';
            if (totalMinutes >= 300) workloadTone = '高稼働';
            if (totalMinutes <= 90) workloadTone = '軽量稼働';

            const analysisPool = [
                `主力タスク「${topTask ? topTask[0] : 'タスク'}」に${focusRatio}%の時間を投下しており、集中配分は良好です。`,
                `タスク数は${taskCount}件で、切り替え頻度は${taskCount >= 5 ? 'やや高め' : '適切'}です。優先順位の維持が成果につながっています。`,
                `総獲得EXPは${totalExp}で、日次の積み上げとしては${totalExp >= 3600 ? '非常に高水準' : '堅実'}です。`
            ];

            const advicePool = [
                `明日は開始 30 分で最重要タスクを先行処理し、初速を作るとさらに効率が上がります。`,
                `同種タスクを連続でまとめるブロック運用にすると、切り替えコストを圧縮できます。`,
                `終業前に 5 分だけ振り返りを入れると、次日の着手がスムーズになります。`
            ];

            return {
                summary: `${workloadTone}の1日でした。合計${totalMinutes}分の作業で${taskCount}件を処理し、主軸は「${topTask ? topTask[0] : 'タスク'}」でした。`,
                analysis: analysisPool[Math.floor(Math.random() * analysisPool.length)],
                advice: advicePool[Math.floor(Math.random() * advicePool.length)],
                generatedAt: new Date().toISOString()
            };
        }

        // --- 6. 経験値＆逆算レベルアップロジック ---
        function recalculateLevelFromTotalExp(totalExp) {
            let currentTotal = Math.max(0, totalExp);
            let newLevel = 1;
            
            while (true) {
                const requiredExp = newLevel * EXP_BASE;
                if (currentTotal >= requiredExp) {
                    currentTotal -= requiredExp;
                    newLevel++;
                } else {
                    break;
                }
            }
            
            AppState.level = newLevel;
            AppState.exp = currentTotal;
        }

        function deductExp(amount) {
            let total = 0;
            for (let i = 1; i < AppState.level; i++) {
                total += i * EXP_BASE;
            }
            total += AppState.exp;

            recalculateLevelFromTotalExp(total - amount);
        }

        function deleteLogById(logId) {
            const index = AppState.taskLogs.findIndex(log => log.id === logId);
            if (index === -1) return;

            const removedLog = AppState.taskLogs[index];
            AppState.taskLogs.splice(index, 1);
            deductExp(removedLog.expGained || 0);

            saveStateToLocalStorage();
            updateStatusUI();
            renderLogs();
            renderCalendar();
        }

        // --- 7. タブ切り替え統合グラフ描画ロジック ---
        function renderUnifiedChart(dayLogs, baseDate) {
            const ctx = document.getElementById('taskChart').getContext('2d');
            const noDataEl = document.getElementById('no-chart-data');

            if (globalChartInstance) {
                globalChartInstance.destroy();
            }

            if (currentGraphTab === 'daily') {
                if (!dayLogs || dayLogs.length === 0) {
                    noDataEl.classList.remove('hidden');
                    return;
                } else {
                    noDataEl.classList.add('hidden');
                }

                const taskSummary = {};
                dayLogs.forEach(log => {
                    const name = log.taskName ? log.taskName.trim() : '名無しのタスク';
                    const min = Math.max(1, Math.round(log.durationSeconds / 60));
                    taskSummary[name] = (taskSummary[name] || 0) + min;
                });

                globalChartInstance = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: Object.keys(taskSummary),
                        datasets: [{
                            data: Object.values(taskSummary),
                            backgroundColor: ['#4f46e5', '#10b981', '#f59e0b', '#ec4899', '#3b82f6', '#8b5cf6'],
                            borderWidth: 2,
                            borderColor: '#ffffff'
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        layout: { padding: { top: 10, bottom: 10, left: 10, right: 10 } },
                        plugins: {
                            legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 10 } } }
                        }
                    }
                });

            } else if (currentGraphTab === 'weekly') {
                noDataEl.classList.add('hidden');

                const dateLabels = [];
                const dateKeys = [];
                for (let i = 6; i >= 0; i--) {
                    const d = new Date(baseDate.getTime());
                    d.setDate(baseDate.getDate() - i);
                    dateLabels.push(`${d.getMonth() + 1}/${d.getDate()}`);
                    dateKeys.push(getDateKey(d));
                }

                const weeklyMinutes = new Array(7).fill(0);
                AppState.taskLogs.forEach(log => {
                    const logKey = getDateKey(new Date(log.endTime));
                    const idx = dateKeys.indexOf(logKey);
                    if (idx !== -1) {
                        weeklyMinutes[idx] += Math.max(1, Math.round(log.durationSeconds / 60));
                    }
                });

                globalChartInstance = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: dateLabels,
                        datasets: [{
                            data: weeklyMinutes,
                            backgroundColor: 'rgba(79, 70, 229, 0.85)',
                            hoverBackgroundColor: '#4f46e5',
                            borderRadius: 4
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        layout: { padding: { top: 10, bottom: 5, left: 5, right: 5 } },
                        scales: {
                            y: { beginAtZero: true, ticks: { font: { size: 9 } }, grid: { color: '#f1f5f9' } },
                            x: { ticks: { font: { size: 9 } }, grid: { display: false } }
                        },
                        plugins: { legend: { display: false } }
                    }
                });
            }
        }

        function setupTabEvents() {
            const tabDaily = document.getElementById('tab-daily');
            const tabWeekly = document.getElementById('tab-weekly');
            const activeClass = "px-2.5 py-1 text-xs font-bold rounded-md bg-white text-indigo-600 shadow-xs cursor-pointer transition";
            const inactiveClass = "px-2.5 py-1 text-xs font-medium rounded-md text-slate-500 hover:text-slate-800 cursor-pointer transition";

            const switchTab = (tab) => {
                currentGraphTab = tab;
                tabDaily.className = tab === 'daily' ? activeClass : inactiveClass;
                tabWeekly.className = tab === 'weekly' ? activeClass : inactiveClass;
                renderLogs();
            };

            tabDaily.addEventListener('click', () => switchTab('daily'));
            tabWeekly.addEventListener('click', () => switchTab('weekly'));
        }

        // --- 8. 経験値の獲得ロジック ---
        function gainExp(amount) {
            AppState.exp += amount;
            let leveledUp = false;

            while (AppState.exp >= AppState.level * EXP_BASE) {
                AppState.exp -= AppState.level * EXP_BASE;
                AppState.level += 1;
                leveledUp = true;
            }

            if (leveledUp) {
                alert(`🎉 レベルアップ！ Lv.${AppState.level} になりました！`);
            }

            updateStatusUI();
            saveStateToLocalStorage();
        }

        // --- 9. タイマー機能のロジック（リロード・バリデーション対策版） ---
        function runTimerDisplayUpdate() {
            const elapsed = Math.floor((Date.now() - timerStartTime) / 1000);
            const hrs = Math.floor(elapsed / 3600).toString().padStart(2, '0');
            const mins = Math.floor((elapsed % 3600) / 60).toString().padStart(2, '0');
            const secs = (elapsed % 60).toString().padStart(2, '0');
            timerDisplay.innerText = `${hrs}:${mins}:${secs}`;
        }

        // F5リロード後にタイマーが走っていたら自動復元する関数
        function checkAndResumeTimer() {
            const savedStartTime = localStorage.getItem(RUNNING_TIMER_START_KEY);
            const savedTaskName = localStorage.getItem(RUNNING_TIMER_NAME_KEY);

            if (savedStartTime) {
                timerStartTime = parseInt(savedStartTime, 10);
                taskNameInput.value = savedTaskName || '';

                // UIの見た目を計測中に変更
                btnStart.classList.add('hidden');
                btnStop.classList.remove('hidden');
                taskNameInput.disabled = true;
                taskNameInput.classList.add('bg-slate-100', 'text-slate-400');

                // 即座に一度表示を合わせ、インターバルを再開
                runTimerDisplayUpdate();
                timerInterval = setInterval(runTimerDisplayUpdate, 250);
            }
        }

        btnStart.addEventListener('click', () => {
            const currentTaskName = taskNameInput.value.trim();
            
            // バリデーション①: 空文字制限
            if (!currentTaskName) {
                alert('計測を開始するにはタスク名を入力してください。');
                return;
            }

            btnStart.classList.add('hidden');
            btnStop.classList.remove('hidden');
            taskNameInput.disabled = true;
            taskNameInput.classList.add('bg-slate-100', 'text-slate-400');

            timerStartTime = Date.now();
            
            // リロード対策: 状態の永続化保存
            localStorage.setItem(RUNNING_TIMER_START_KEY, timerStartTime.toString());
            localStorage.setItem(RUNNING_TIMER_NAME_KEY, currentTaskName);

            timerInterval = setInterval(runTimerDisplayUpdate, 250);
        });

        btnStop.addEventListener('click', () => {
            if (!timerInterval) return;
            clearInterval(timerInterval);
            timerInterval = null;

            const durationSeconds = Math.floor((Date.now() - timerStartTime) / 1000);
            timerStartTime = null;
            timerDisplay.innerText = "00:00:00";
            btnStart.classList.remove('hidden');
            btnStop.classList.add('hidden');
            taskNameInput.disabled = false;
            taskNameInput.classList.remove('bg-slate-100', 'text-slate-400');

            // 一時保存データの破棄
            localStorage.removeItem(RUNNING_TIMER_START_KEY);
            localStorage.removeItem(RUNNING_TIMER_NAME_KEY);

            // バリデーション②: 誤操作（短時間）ガード（5秒未満は切り捨て）
            if (durationSeconds < 5) {
                alert('計測時間が5秒未満のため、実績ログには記録されませんでした。');
                taskNameInput.value = '';
                return;
            }

            const expGained = durationSeconds; 
            const currentTaskName = taskNameInput.value.trim();
            const now = new Date();
            const logTimestamp = new Date(currentSelectedDate.getTime());
            logTimestamp.setHours(now.getHours(), now.getMinutes(), now.getSeconds());

            const newLog = {
                id: crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(),
                taskName: currentTaskName,
                startTime: new Date(logTimestamp.getTime() - (durationSeconds * 1000)).toISOString(),
                endTime: logTimestamp.toISOString(),
                durationSeconds: durationSeconds,
                expGained: expGained
            };

            AppState.taskLogs.push(newLog);
            saveStateToLocalStorage();
            renderLogs();
            renderCalendar();
            gainExp(expGained);
            taskNameInput.value = '';
        });

        // ログ一覧の削除イベント受付
        document.getElementById('log-table-body').addEventListener('click', (event) => {
            const target = event.target.closest('[data-delete-log-id]');
            if (!target) return;
            const logId = target.getAttribute('data-delete-log-id');
            if (logId) deleteLogById(logId);
        });

        // AI日報ボタンイベント
        btnGenerateAIReport.addEventListener('click', async () => {
            const dateKey = getDateKey(currentSelectedDate);
            const dayLogs = getFilteredLogsByDate(currentSelectedDate);

            if (dayLogs.length === 0) {
                alert('この日はログがないため、AI日報を生成できません。');
                return;
            }

            btnGenerateAIReport.disabled = true;
            btnGenerateAIReport.classList.add('opacity-60', 'cursor-not-allowed');
            aiReportLoading.classList.remove('hidden');

            await new Promise(resolve => setTimeout(resolve, 1500));

            aiReports[dateKey] = generateAIReportFromLogs(dayLogs);
            saveAIReportsToLocalStorage();

            aiReportLoading.classList.add('hidden');
            btnGenerateAIReport.disabled = false;
            btnGenerateAIReport.classList.remove('opacity-60', 'cursor-not-allowed');
            renderLogs();
        });

        btnDeleteAIReport.addEventListener('click', () => {
            const dateKey = getDateKey(currentSelectedDate);
            if (!aiReports[dateKey]) return;
            delete aiReports[dateKey];
            saveAIReportsToLocalStorage();
            renderLogs();
        });

        // 全データの初期化（開発・データ詰まり対策用）
        btnResetAll.addEventListener('click', () => {
            if (confirm('【注意】これまでのすべての実績ログ、レベル、AI日報データが完全に消去されます。よろしいですか？')) {
                localStorage.clear();
                AppState = { level: 1, exp: 0, taskLogs: [] };
                aiReports = {};
                timerStartTime = null;
                if(timerInterval) clearInterval(timerInterval);
                timerDisplay.innerText = "00:00:00";
                
                // UI状態のリセット
                btnStart.classList.remove('hidden');
                btnStop.classList.add('hidden');
                taskNameInput.disabled = false;
                taskNameInput.classList.remove('bg-slate-100', 'text-slate-400');
                taskNameInput.value = '';

                updateStatusUI();
                renderCalendar();
                renderLogs();
                alert('すべてのデータを初期化しました。');
            }
        });

        // --- 10. アプリ起動時の初期化処理 ---
        window.addEventListener('DOMContentLoaded', () => {
            loadStateFromLocalStorage();
            checkAndResumeTimer(); // 起動時にリロード対策のチェックを走らせる
        });

    </script>
</body>
</html>
